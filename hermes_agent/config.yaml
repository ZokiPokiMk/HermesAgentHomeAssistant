name: Hermes Agent
version: "0.1.8"
slug: hermes_agent
description: Self-improving AI agent with Home Assistant event monitoring and smart-home tools.
url: https://github.com/ZokiPokiMk/HermesAgentHomeAssistant
arch:
  - amd64
  - aarch64
startup: services
boot: auto
stage: experimental
init: false
homeassistant_api: true
hassio_api: false

ingress: true
ingress_port: 48099
panel_title: Hermes Agent
panel_icon: mdi:robot
ports:
  48099/tcp: 9119
  49118/tcp: 9118
  8787/tcp: 8787
ports_description:
  48099/tcp: External Hermes Agent web UI and terminal proxy.
  49118/tcp: External Hermes dashboard.
  8787/tcp: Hermes Web UI.

backup: hot
backup_exclude:
  - ".hermes/cache/*"
  - ".hermes/home/.cache/*"
map:
  - type: addon_config
    read_only: false
    path: /config
  - type: share
    read_only: false
  - type: media
    read_only: false
options:
  timezone: "Asia/Seoul"
  enable_terminal: true
  terminal_port: 7681
  enable_dashboard: true
  ha_notification_mode: errors_only
  use_supervisor_api: true
  hass_url: "http://homeassistant:8123"
  watch_domains:
    - climate
    - alarm_control_panel
    - light
    - switch
    - binary_sensor
  watch_entities:
    - sensor.tz3000_zl1kmjqx_ty0201_temperature
  ignore_entities:
    - sensor.uptime
    - sensor.cpu_usage
    - sensor.memory_usage
  watch_all: false
  cooldown_seconds: 30
  terminal_timeout: 180
  force_ipv4_dns: true
  http_proxy: ""
  nginx_log_level: minimal
  tui: false
  insecure: true
  enable_webui: true
  webui_password: ""
schema:
  timezone: str
  enable_terminal: bool
  terminal_port: "int(1024,65535)"
  enable_dashboard: bool
  ha_notification_mode: "list(all|errors_only|off)"
  use_supervisor_api: bool
  hass_url: url
  watch_domains:
    - str
  watch_entities:
    - str
  ignore_entities:
    - str
  watch_all: bool
  cooldown_seconds: "int(0,3600)"
  terminal_timeout: "int(10,3600)"
  force_ipv4_dns: bool
  http_proxy: "str?"
  nginx_log_level: "list(full|minimal)"
  hass_token: "password?"
  tui: bool
  insecure: bool
  enable_webui: bool
  webui_password: "password?"
